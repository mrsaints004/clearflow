// Multi-participant Canton topology for ClearFlow
//
// Privacy architecture:
//   - Each participant node hosts one or more parties
//   - participant-operator: hosts the Operator party (platform admin)
//   - participant-1 through participant-3: available for dynamically registered parties
//   - The sequencer only delivers transaction views to participants
//     whose hosted parties are stakeholders (signatories or observers)
//
// This means a lender on participant-2 physically cannot see a bid
// submitted by a lender on participant-3 — the data never reaches their node.
//
// Usage:
//   canton daemon --config topology.conf --bootstrap bootstrap.canton

canton {
  participants {
    participant-operator {
      storage.type = memory
      admin-api.port = 5011
      ledger-api.port = 6861
    }
    participant-1 {
      storage.type = memory
      admin-api.port = 5012
      ledger-api.port = 6862
    }
    participant-2 {
      storage.type = memory
      admin-api.port = 5013
      ledger-api.port = 6863
    }
    participant-3 {
      storage.type = memory
      admin-api.port = 5014
      ledger-api.port = 6864
    }
  }

  domains {
    clearflow-domain {
      storage.type = memory
      public-api.port = 5018
      admin-api.port = 5019
    }
  }
}
