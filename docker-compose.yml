# ClearFlow Docker Compose
# Starts the full application stack for local development and hackathon demos.
#
# Usage:
#   docker-compose up --build        # Start everything
#   docker-compose up --build app    # App only (standalone ledger mode)
#   docker-compose down -v           # Stop and clean up
#
# The app automatically detects Canton availability:
#   - If Canton is reachable: uses Canton ledger with protocol-level privacy
#   - If not: falls back to standalone ledger with application-level privacy

services:
  # ClearFlow application (backend + frontend)
  app:
    build: .
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - APP_SECRET=${APP_SECRET:-clearflow-docker-secret-change-me}
      - JWT_SECRET=${JWT_SECRET:-clearflow-docker-jwt-change-me}
      - OPERATOR_PASSWORD=${OPERATOR_PASSWORD:-operator-docker-pw}
      - REQUIRE_AUTH=false
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3002
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  app-data:
    driver: local
